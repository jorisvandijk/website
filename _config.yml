title: Jorisvandijk.com
description: The home of Joris van Dijk
theme: just-the-docs
color_scheme: everforest

url: https://jorisvandijk.com/

# logo: "/images/logo.png"
favicon_ico: "/assets/img/favicon.ico"

aux_links:
  Blog: /blog/

search_enabled: true

# Configure where Jekyll looks for pages
include:
  - _pages

# Configure blog settings
defaults:
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"
      permalink: "/blog/:year/:month/:day/:title/"

heading_anchors: true
gh_edit_link: true
gh_edit_repository: https://github.com/jorisvandijk/website
gh_edit_branch: "main"
gh_edit_view_mode: "tree"

last_edit_timestamp: true 
last_edit_time_format: "%B %d, %Y" 
