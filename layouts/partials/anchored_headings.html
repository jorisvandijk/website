{{- /* formats .Content headings by adding an anchor */ -}}
{{- /* also strips the stray linebreak goldmark emits before a footnote's
       back-reference arrow, so the arrow can't wrap onto its own line */ -}}
{{ . | replaceRE "(<h[1-6] id=\"([^\"]+)\".+)(</h[1-6]+>)" "${1}<a hidden class=\"anchor\" aria-hidden=\"true\" href=\"#${2}\">#</a>${3}" | replaceRE "\n(&#160;<a href=\"?#fnref)" "${1}" | safeHTML }}
