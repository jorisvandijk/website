<div class="h-card" hidden>
  <a class="p-name u-url" href="https://jorisvandijk.com/">Joris van Dijk</a>
  <img class="u-photo" src="https://jorisvandijk.com/img/mrgreen.png" alt="">
  <p class="p-note">
  echo ${core_dump} > /www/blog - Linux, homelabbing, tech, notes, thoughts, and things I found worth jotting down when I should have been doing something more productive. I’m Joris, this is my blog. Hi. </p>
</div>

<script>
document.querySelectorAll('.footnote-ref').forEach(function (ref) {
  ref.addEventListener('click', function () {
    var target = document.getElementById(ref.getAttribute('href').slice(1));
    if (!target) return;
    target.classList.remove('footnote-flash');
    void target.offsetWidth;
    target.classList.add('footnote-flash');
  });
});
</script>
